name: GitHub Classroom Autograding
on: [push]

permissions:
  checks: write
  actions: read
  contents: read

jobs:
  build:
    name: Autograding
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache PlatformIO
        uses: actions/cache@v3
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-platformio

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio

      - name: Run Autograder Script
        run: ./scripts/autograder.sh

      # Optional: Integration with GitHub Classroom Autograding Action
      # This requires a .github/classroom/autograding.json file to be present
      # for points to show up in the classroom UI.
      # - name: Autograding Reporter
      #   uses: education/autograding@v1
